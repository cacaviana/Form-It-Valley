name: 'Build and deploy Python app to Azure Web App: formitvalleybackend'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python version
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies (compatible with Azure Bullseye glibc)
      working-directory: backend
      run: |
        mkdir -p .python_packages/lib/site-packages
        pip install -r requirements.txt \
          --target=.python_packages/lib/site-packages \
          --platform manylinux_2_28_x86_64 \
          --python-version 3.12 \
          --implementation cp \
          --only-binary=:all:

    - name: Zip deploy package
      working-directory: backend
      run: zip -r deploy.zip . -x "__pycache__/*" "*.pyc" ".env" "antenv/*" "venv/*"

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'formsitvalleybackend'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
        package: backend/deploy.zip
