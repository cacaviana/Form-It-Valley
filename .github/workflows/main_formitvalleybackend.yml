name: 'Build and deploy Python app to Azure Web App: formitvalleybackend'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Zip deploy package (without venv - Azure installs on startup)
      working-directory: backend
      run: zip -r deploy.zip . -x "__pycache__/*" "*.pyc" ".env" "antenv/*" "venv/*"

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'formsitvalleybackend'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BACKEND }}
        package: backend/deploy.zip
