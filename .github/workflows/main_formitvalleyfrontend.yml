name: 'Build and deploy Node.js app to Azure Web App: formitvalleyfrontend'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js version
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Build
      working-directory: frontend
      run: npm run build

    # Publica o projeto com a pasta build/ ANINHADA (build/index.js) + deps de producao.
    # Esse e o layout que o startup command do App Service espera: "node build".
    # (Nao achatar build/ pra raiz, senao o entry vira ./index.js e exige "node index.js".)
    - name: Prepare deploy package
      working-directory: frontend
      run: |
        rm -rf deploy
        mkdir deploy
        cp -r build deploy/build
        cp package.json package-lock.json deploy/
        cd deploy && npm install --omit=dev

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'formsitvalleyfrontend'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
        package: frontend/deploy
